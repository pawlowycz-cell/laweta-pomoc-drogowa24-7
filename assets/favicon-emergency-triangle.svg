<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 118" width="128" height="118">
  <title>Emergency warning triangle</title>
  <!-- Як на референсі: товста червона «рефлективна» рамка, суцільний помаранчевий центр -->
  <defs>
    <pattern id="redDots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.15" fill="#ff6b6b" opacity="0.35"/>
    </pattern>
    <pattern id="redHatch" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#ffb3b3" stroke-width="1.2" opacity="0.25"/>
    </pattern>
    <linearGradient id="orangeFill" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="55%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#fdba74"/>
    </linearGradient>
  </defs>
  <!-- Помаранчеве заповнення (внутрішній трикутник) -->
  <path d="M64 22 L102 92 L26 92 Z" fill="url(#orangeFill)"/>
  <!-- Червона рамка (кільце трикутника) -->
  <path
    fill="#c40000"
    fill-rule="evenodd"
    d="M64 8 L120 100 L8 100 Z M64 24 L102 88 L26 88 Z"/>
  <path
    fill="url(#redDots)"
    fill-rule="evenodd"
    opacity="0.9"
    d="M64 8 L120 100 L8 100 Z M64 24 L102 88 L26 88 Z"/>
  <path
    fill="url(#redHatch)"
    fill-rule="evenodd"
    opacity="0.85"
    d="M64 8 L120 100 L8 100 Z M64 24 L102 88 L26 88 Z"/>
  <!-- Легкий блік на помаранчевому -->
  <path d="M64 28 L88 84 L40 84 Z" fill="#fff" opacity="0.12"/>
</svg>
