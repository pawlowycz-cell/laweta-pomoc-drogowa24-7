<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <title>Emergency warning triangle</title>
  <!-- Як у Google: червона рамка + світлий центр (у круглій масці читається «червоно-білий») -->
  <defs>
    <pattern id="redDots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.15" fill="#ff8a8a" opacity="0.4"/>
    </pattern>
    <pattern id="redHatch" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#ffc9c9" stroke-width="1.2" opacity="0.3"/>
    </pattern>
    <linearGradient id="innerLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="40%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <g transform="translate(0,9)">
  <path d="M64 22 L102 92 L26 92 Z" fill="url(#innerLight)"/>
  <path
    fill="#c40000"
    fill-rule="evenodd"
    d="M64 8 L120 100 L8 100 Z M64 24 L102 88 L26 88 Z"/>
  <path
    fill="url(#redDots)"
    fill-rule="evenodd"
    opacity="0.9"
    d="M64 8 L120 100 L8 100 Z M64 24 L102 88 L26 88 Z"/>
  <path
    fill="url(#redHatch)"
    fill-rule="evenodd"
    opacity="0.85"
    d="M64 8 L120 100 L8 100 Z M64 24 L102 88 L26 88 Z"/>
  <path d="M64 28 L88 84 L40 84 Z" fill="#fff" opacity="0.35"/>
  </g>
</svg>
