<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 112" width="128" height="112">
  <title>Emergency warning triangle</title>
  <!-- Classic EU-style folding triangle: red frame, reflective orange centre -->
  <defs>
    <linearGradient id="refl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="45%" stop-color="#ff9a1a"/>
      <stop offset="100%" stop-color="#e85d04"/>
    </linearGradient>
  </defs>
  <!-- Feet -->
  <rect x="22" y="98" width="14" height="10" rx="2" fill="#1a1a1a"/>
  <rect x="92" y="98" width="14" height="10" rx="2" fill="#1a1a1a"/>
  <!-- Red outer triangle -->
  <path d="M64 6 L118 98 L10 98 Z" fill="none" stroke="#c41221" stroke-width="10" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Reflective panel -->
  <path d="M64 28 L98 90 L30 90 Z" fill="url(#refl)"/>
  <!-- Inner dark triangle (depth) -->
  <path d="M64 44 L82 78 L46 78 Z" fill="#2d0a0a" opacity="0.55"/>
</svg>
